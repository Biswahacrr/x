<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCKRODAIL PRO INJECTOR</title>
    <style>
        /* --- FUTURISTIC GAMING HUD STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background: #020617;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 15px;
        }

        /* --- THEME 1: DEFAULT GLOWING BACKDROP --- */
        .default-glows::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            background: #00f2ff;
            filter: blur(130px);
            opacity: 0.15;
            top: 10%;
            left: 5%;
            pointer-events: none;
            z-index: 1;
        }

        .default-glows::after {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            background: #00ffaa;
            filter: blur(130px);
            opacity: 0.1;
            bottom: 10%;
            right: 5%;
            pointer-events: none;
            z-index: 1;
        }

        /* --- THEME 2: PERFECT CLEAR HD VIDEO BACKGROUND --- */
        #video-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
            pointer-events: none;
        }

        /* --- THEME SELECTOR HUD PANEL --- */
        .theme-selector-hud {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.4);
            border-radius: 8px;
            padding: 6px 10px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .theme-selector-hud label {
            font-size: 10px;
            font-weight: bold;
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .theme-selector-hud select {
            background: #0f172a;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        /* --- HEADER SECTION --- */
        header {
            text-align: center;
            margin-bottom: 18px;
            width: 100%;
            max-width: 350px;
            z-index: 10;
        }

        .main-title {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00f2ff;
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dev-info {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }

        /* --- PREMIUM GLASSMORPHISM PANEL --- */
        .panel-card {
            background: rgba(7, 11, 25, 0.88);
            border: 2px solid #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3), inset 0 0 15px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            width: 100%;
            max-width: 330px;
            padding: 22px;
            display: none;
            opacity: 0;
            transform: scale(0.94);
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 10;
        }

        .panel-card.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        /* --- INPUT MATRIX SYSTEM --- */
        .input-group {
            margin-bottom: 14px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            color: #00f2ff;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            padding: 11px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            background: rgba(15, 23, 42, 0.9);
        }

        /* --- UI LIGHTING BUTTONS --- */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 12px;
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn-primary {
            background: linear-gradient(90deg, #0055ff, #00f2ff);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(0, 242, 255, 0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #00f2ff;
        }

        .btn-secondary:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: #00f2ff;
        }

        /* --- DATA HUD LAYOUT DISPLAY --- */
        .hud-row {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 8px;
            padding: 9px 11px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hud-value {
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            word-break: break-all;
            padding-right: 8px;
            flex: 1;
            text-align: right;
        }

        .btn-copy {
            background: #1e293b;
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: #00f2ff;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-copy:hover {
            background: #00f2ff;
            color: #000000;
        }

        .status-active {
            color: #00ffaa !important;
            text-shadow: 0 0 8px rgba(0, 255, 170, 0.4);
        }

        .status-expired {
            color: #ff3366 !important;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.4);
        }

        .countdown-box {
            color: #ffaa00 !important;
            font-family: monospace;
            font-size: 13px;
        }

        /* --- TOAST PANEL SYSTEM --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 40px);
            max-width: 290px;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            border-left: 4px solid #00f2ff;
            color: #fff;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: toastIn 0.3s forwards;
        }
